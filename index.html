<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .upload-area {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .upload-area.dragover {
            background: #f0f4ff;
            border: 3px dashed #667eea;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
        }

        .upload-subtext {
            color: #666;
            margin-bottom: 20px;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #fileInput {
            display: none;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .image-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.2s ease;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .image-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .image-number {
            font-weight: 600;
            color: #667eea;
            font-size: 0.9em;
        }

        .tag-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 0.9em;
            transition: border-color 0.2s ease;
        }

        .tag-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .tag-input::placeholder {
            color: #999;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s ease;
            width: 100%;
        }

        .remove-btn:hover {
            background: #ff3838;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        .pdf-title-input {
            padding: 15px 20px;
            font-size: 1.1em;
            border: 3px solid white;
            border-radius: 25px;
            background: white;
            color: #333;
            min-width: 300px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .pdf-title-input:focus {
            outline: none;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .pdf-title-input::placeholder {
            color: #999;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #f0f4ff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .btn {
                padding: 12px 25px;
                font-size: 1em;
            }

            .pdf-title-input {
                min-width: 100%;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Image to PDF Converter</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Drag & Drop Images Here</div>
            <div class="upload-subtext">or click to browse</div>
            <label for="fileInput" class="file-input-label">Choose Images</label>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <div id="imagesContainer">
            <div class="empty-state">No images added yet. Add some images to get started!</div>
        </div>

        <div class="action-buttons" id="actionButtons" style="display: none;">
            <input 
                type="text" 
                id="pdfTitle" 
                class="pdf-title-input" 
                placeholder="Enter PDF filename (optional)"
                value="combined-images"
            >
            <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
            <button class="btn btn-primary" onclick="generatePDF()">Generate PDF</button>
        </div>
    </div>

    <script>
        let images = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const imagesContainer = document.getElementById('imagesContainer');
        const actionButtons = document.getElementById('actionButtons');

        // Paste event listener
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.indexOf('image') !== -1) {
                    const file = item.getAsFile();
                    addImage(file);
                }
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        // File input
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.type.startsWith('image/')) {
                    addImage(file);
                }
            }
        }

        function addImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                images.push({
                    data: e.target.result,
                    tag: ''
                });
                renderImages();
            };
            reader.readAsDataURL(file);
        }

        function updateTag(index, value) {
            images[index].tag = value;
        }

        function renderImages() {
            if (images.length === 0) {
                imagesContainer.innerHTML = '<div class="empty-state">No images added yet. Add some images to get started!</div>';
                actionButtons.style.display = 'none';
                return;
            }

            actionButtons.style.display = 'flex';
            
            let html = '<div class="images-grid">';
            images.forEach((img, index) => {
                html += `
                    <div class="image-card">
                        <img src="${img.data}" alt="Image ${index + 1}">
                        <div class="image-controls">
                            <span class="image-number">Image ${index + 1}</span>
                            <input 
                                type="text" 
                                class="tag-input" 
                                placeholder="Add a tag (optional)" 
                                value="${img.tag}"
                                onchange="updateTag(${index}, this.value)"
                            >
                            <button class="remove-btn" onclick="removeImage(${index})">Remove</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            imagesContainer.innerHTML = html;
        }

        function removeImage(index) {
            images.splice(index, 1);
            renderImages();
        }

        function clearAll() {
            if (confirm('Are you sure you want to clear all images?')) {
                images = [];
                renderImages();
            }
        }

        async function generatePDF() {
            if (images.length === 0) {
                alert('Please add at least one image!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            
            for (let i = 0; i < images.length; i++) {
                if (i > 0) {
                    pdf.addPage();
                }
                
                const img = new Image();
                img.src = images[i].data;
                
                await new Promise((resolve) => {
                    img.onload = () => {
                        const pageWidth = pdf.internal.pageSize.getWidth();
                        const pageHeight = pdf.internal.pageSize.getHeight();
                        
                        const imgWidth = img.width;
                        const imgHeight = img.height;
                        const ratio = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
                        
                        const width = imgWidth * ratio;
                        const height = imgHeight * ratio;
                        const x = (pageWidth - width) / 2;
                        const y = (pageHeight - height) / 2;
                        
                        pdf.addImage(images[i].data, 'JPEG', x, y, width, height);
                        
                        // Add tag as text if it exists
                        if (images[i].tag && images[i].tag.trim() !== '') {
                            pdf.setFontSize(12);
                            pdf.setTextColor(100, 100, 100);
                            pdf.text(images[i].tag, pageWidth / 2, pageHeight - 10, { align: 'center' });
                        }
                        
                        resolve();
                    };
                });
            }
            
            // Get custom filename or use default
            let filename = document.getElementById('pdfTitle').value.trim();
            if (!filename) {
                filename = 'combined-images';
            }
            // Remove .pdf extension if user added it
            filename = filename.replace(/\.pdf$/i, '');
            
            pdf.save(`${filename}.pdf`);
        }

        // Initial render
        renderImages();
    </script>
</body>
</html>
